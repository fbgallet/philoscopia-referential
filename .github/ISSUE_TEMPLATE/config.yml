    url: https://github.com/fbgallet/philoscopia-referential/blob/main/MODEL.md
    about: The semantics of axes, positions, statuses and graphs. Most disagreements dissolve once the intended meaning of a position value is clear.
  - name: How contributions are integrated (CONTRIBUTING.md)
    url: https://github.com/fbgallet/philoscopia-referential/blob/main/CONTRIBUTING.md
    about: This repo is a generated mirror; accepted changes are merged upstream and re-exported. Edit data/ JSON only, never views/ or schemas/ (both generated).
