# Issue chooser configuration.
# Blank issues stay enabled: not every useful remark fits a form (a broad
# methodological objection, a question about the model). Prefer a form when one
# matches — it collects the sources and ids we need to act without a round-trip.
blank_issues_enabled: true
contact_links:
