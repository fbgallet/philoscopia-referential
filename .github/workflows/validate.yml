name: Validate corpus

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node scripts/check-json.mjs
      - name: MCP server smoke test
        working-directory: mcp
        run: npm ci && npm run smoke
